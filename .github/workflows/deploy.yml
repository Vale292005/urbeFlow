name: Deploy UrbeFlow Backend

# 🚀 El "Trigger": Se activa cada vez que subes código a la rama main
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Copia tu código en el servidor de GitHub
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Configura Java 21 para validar que compile bien antes de subirlo
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # 3. Prueba Automatizada (Integración Continua)
    - name: Run Automated Tests with Maven
      run: mvn clean test

    # 4. Despliegue Continuo: Le avisa a Render que se actualice
    - name: Trigger Render Deploy
      if: success() # Solo si la compilación de arriba no falló
      run: |
        curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"